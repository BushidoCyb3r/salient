name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Enforce commit attribution
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          set -euo pipefail
          expected_name='BushidoCyb3r'
          expected_email='BushidoCyb3r@users.noreply.github.com'
          git cat-file -e "$HEAD_SHA^{commit}"
          if [[ -z "$BASE_SHA" || "$BASE_SHA" =~ ^0+$ ]]; then
            commits=("$HEAD_SHA")
          else
            git cat-file -e "$BASE_SHA^{commit}"
            mapfile -t commits < <(git rev-list "$BASE_SHA..$HEAD_SHA")
          fi
          failed=0
          for commit in "${commits[@]}"; do
            IFS=$'\t' read -r author_name author_email committer_name committer_email \
              < <(git show -s --format='%an%x09%ae%x09%cn%x09%ce' "$commit")
            if [[ "$author_name" != "$expected_name" || "$author_email" != "$expected_email" ||
                  "$committer_name" != "$expected_name" || "$committer_email" != "$expected_email" ]]; then
              echo "Unexpected author or committer identity on $commit"
              failed=1
            fi
            if git show -s --format=%B "$commit" | grep -Eiq '^(co-authored-by[[:space:]]*:|generated[- ]by[[:space:]]*:|generated[- ]with([[:space:]]*:|[[:space:]]+))'; then
              echo "Prohibited attribution trailer on $commit"
              failed=1
            fi
          done
          exit "$failed"
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - run: gofmt -l . | tee /dev/stderr | wc -l | grep -qx 0
      - run: go vet ./...
      - run: go test -race ./...
      - name: Cross-compile all release targets
        run: make cross
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: salient-cli-binaries
          path: bin/salient-*

  gui-build:
    strategy:
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install Linux webview dependency
        if: matrix.os == 'ubuntu-24.04'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Install Wails CLI
        if: matrix.os != 'ubuntu-24.04'
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
      - name: Install analysis tools
        if: matrix.os == 'ubuntu-24.04'
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@v0.7.0
          go install golang.org/x/tools/cmd/deadcode@v0.48.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build GUI (Linux)
        if: matrix.os == 'ubuntu-24.04'
        run: make gui
      - name: Check generated Wails bindings
        if: matrix.os == 'ubuntu-24.04'
        run: git diff --exit-code -- gui/frontend/wailsjs
      - name: Build GUI (macOS and Windows)
        if: matrix.os != 'ubuntu-24.04'
        working-directory: gui
        run: |
          wails build ${{ matrix.os == 'macos-15' && '-platform darwin/universal' || '' }}
      - name: Test frontend
        if: matrix.os == 'ubuntu-24.04'
        working-directory: gui/frontend
        run: |
          find src -type f -name '*.js' -exec node --check {} +
          npm test
      - name: Smoke-test frontend
        if: matrix.os == 'ubuntu-24.04'
        shell: bash
        run: |
          set -euo pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 --directory gui/frontend/dist \
            > "$RUNNER_TEMP/frontend-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for _ in {1..20}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && break
            sleep 0.25
          done
          curl -fsS http://127.0.0.1:4173/ >/dev/null
          browser="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          test -n "$browser"
          timeout 30s "$browser" --headless --disable-gpu --virtual-time-budget=5000 \
            --dump-dom http://127.0.0.1:4173/ > "$RUNNER_TEMP/frontend-dom.html"
          grep -Eq '<html[^>]*data-salient-ready="true"' "$RUNNER_TEMP/frontend-dom.html"
      - name: Static analysis
        if: matrix.os == 'ubuntu-24.04'
        run: |
          staticcheck ./...
          (cd gui && staticcheck ./...)
      - name: Check dead code from both entrypoints
        if: matrix.os == 'ubuntu-24.04'
        shell: bash
        run: |
          set -euo pipefail
          root="$RUNNER_TEMP/deadcode-root.txt"
          gui="$RUNNER_TEMP/deadcode-gui.txt"
          deadcode ./... > "$root"
          (cd gui && deadcode -filter='github.com/BushidoCyb3r/salient' .) > "$gui"
          sed -E -e "s#^${GITHUB_WORKSPACE}/##" -e 's#^\.\./##' -e 's/^([^:]+:[0-9]+):.*/\1/' "$root" | sort -u > "$root.norm"
          sed -E -e "s#^${GITHUB_WORKSPACE}/##" -e 's#^\.\./##' -e 's/^([^:]+:[0-9]+):.*/\1/' "$gui" | sort -u > "$gui.norm"
          comm -12 "$root.norm" "$gui.norm" > "$RUNNER_TEMP/deadcode-common.txt"
          if [ -s "$RUNNER_TEMP/deadcode-common.txt" ]; then
            echo "Code unreachable from both executable entrypoints:"
            cat "$RUNNER_TEMP/deadcode-common.txt"
            exit 1
          fi
      # after the build: frontend/dist is gitignored and go:embed needs it,
      # so the module only compiles once wails build has generated it
      - name: Test GUI module
        working-directory: gui
        run: go test ./...
      - name: Archive macOS app
        if: matrix.os == 'macos-15'
        working-directory: gui/build/bin
        run: ditto -c -k --sequesterRsrc --keepParent Salient.app Salient-macOS.zip
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: salient-gui-${{ matrix.os }}
          path: |
            gui/build/bin/salient
            gui/build/bin/salient.exe
            gui/build/bin/Salient-macOS.zip

  # Verifies the RHEL-family build path. On Fedora (RHEL upstream) webkit2gtk
  # ships as 4.1 — the same API the Rocky dev box uses — so `make gui`
  # auto-adds -tags webkit2_41 via its pkg-config probe. GitHub has no
  # RHEL-family runner, so run Fedora in a container. (Rocky/RHEL 9 only ships
  # the older webkit2gtk-4.0 API; Fedora exercises the 4.1 path we actually ship.)
  gui-build-fedora:
    runs-on: ubuntu-24.04
    container: fedora@sha256:52cfb35e60823b691af7541b576c0fa49195628044b2c1a15b0ae775ec01048e # Fedora 43 amd64
    steps:
      - name: Install base tools and webview build deps
        run: dnf -y install gcc make git tar gzip which pkgconf-pkg-config gtk3-devel webkit2gtk4.1-devel
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      # No separate wails install: `make gui` self-bootstraps the pinned
      # repo-local wails CLI into .tools/bin (a PATH install is ignored by
      # the Makefile and previously left this job failing with exit 127).
      - name: Build GUI (make gui adds -tags webkit2_41)
        run: make gui
      - name: Test GUI module
        working-directory: gui
        run: go test ./...
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: salient-gui-fedora
          path: gui/build/bin/*

  package-linux:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
      - name: Install Linux webview dependency
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Build deb + rpm packages
        run: make package-linux VERSION=${GITHUB_REF_NAME#v}
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: salient-gui-linux-packages
          path: dist/*

  release:
    needs: [test, gui-build, package-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release-assets
          cp artifacts/salient-cli-binaries/salient-linux-amd64 release-assets/salient-cli-linux-amd64
          cp artifacts/salient-cli-binaries/salient-darwin-arm64 release-assets/salient-cli-darwin-arm64
          cp artifacts/salient-cli-binaries/salient-windows-amd64.exe release-assets/salient-cli-windows-amd64.exe
          cp artifacts/salient-gui-linux-packages/*.deb artifacts/salient-gui-linux-packages/*.rpm release-assets/
          cp artifacts/salient-gui-macos-15/Salient-macOS.zip release-assets/
          cp artifacts/salient-gui-windows-2025/salient.exe release-assets/Salient-Windows.exe
          (cd release-assets && sha256sum * > SHA256SUMS)
      - name: Attest release assets
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: release-assets/*
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            release-assets/*
