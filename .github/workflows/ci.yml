name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: gofmt -l . | tee /dev/stderr | wc -l | grep -qx 0
      - run: go vet ./...
      - run: go test -race ./...
      - name: Cross-compile all release targets
        run: make cross

  gui-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Linux webview dependency
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build GUI
        working-directory: gui
        run: wails build ${{ matrix.os == 'ubuntu-latest' && '-tags webkit2_41' || '' }}
      # after the build: frontend/dist is gitignored and go:embed needs it,
      # so the module only compiles once wails build has generated it
      - name: Test GUI module
        working-directory: gui
        run: go test ./...
      - uses: actions/upload-artifact@v4
        with:
          name: defilade-gui-${{ matrix.os }}
          path: gui/build/bin/*

  # Verifies the RHEL-family build path (Rocky/Fedora): webkit2gtk ships as
  # 4.1 there, so `make gui` auto-adds -tags webkit2_41 via its pkg-config
  # probe. GitHub has no RHEL runner, so run Rocky 9 in a container.
  gui-build-rocky:
    runs-on: ubuntu-latest
    container: rockylinux:9
    steps:
      - name: Install base tools and webview build deps
        run: |
          dnf -y install 'dnf-command(config-manager)'
          dnf config-manager --set-enabled crb
          dnf -y install epel-release
          dnf -y install gcc make git tar gzip which pkgconf-pkg-config gtk3-devel webkit2gtk4.1-devel
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Build GUI (make gui adds -tags webkit2_41)
        run: make gui
      - name: Test GUI module
        working-directory: gui
        run: go test ./...
      - uses: actions/upload-artifact@v4
        with:
          name: defilade-gui-rockylinux9
          path: gui/build/bin/*
