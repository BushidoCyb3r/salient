name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: gofmt -l . | tee /dev/stderr | wc -l | grep -qx 0
      - run: go vet ./...
      - run: go test -race ./...
      - name: Cross-compile all release targets
        run: make cross

  gui-build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Linux webview dependency
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Test GUI module
        working-directory: gui
        run: go test ./...
      - name: Build GUI
        working-directory: gui
        run: wails build ${{ matrix.os == 'ubuntu-latest' && '-tags webkit2_41' || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: defilade-gui-${{ matrix.os }}
          path: gui/build/bin/*
