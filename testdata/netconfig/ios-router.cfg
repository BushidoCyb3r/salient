!
! Sample Cisco IOS running-config for parser tests.
!
version 15.7
hostname edge-rtr-01
!
enable secret 5 $1$abc$hashvaluethatmustnotleak
!
username admin privilege 15 secret 5 $1$xyz$anotherhash
!
snmp-server community s3cret RO
snmp-server community wr1te RW
tacacs-server key t4cacs
!
vrf definition MGMT
!
interface GigabitEthernet0/0
 description WAN uplink
 ip address 203.0.113.2 255.255.255.252
 ip address 203.0.113.6 255.255.255.252 secondary
 ip access-group EDGE_IN in
!
interface GigabitEthernet0/1
 description spare
 shutdown
!
interface GigabitEthernet0/0.40
 encapsulation dot1Q 40
 ip address 10.0.40.1 255.255.255.0
!
ip access-list extended EDGE_IN
 permit tcp any host 10.0.1.10 eq 443
 permit tcp 10.0.1.0 0.0.0.255 any eq 22
 deny ip any any
 permit udp any eq 53 any
 permit tcp any any established
 permit ip any object-group SERVERS
 permit tcp any 10.0.0.0 0.255.0.255 eq 80
 permit gre any any
 deny tcp any host 10.0.1.20 neq 23
!
access-list 10 permit 10.0.1.0 0.0.0.255
access-list 10 deny any
!
ip route 0.0.0.0 0.0.0.0 203.0.113.1
ip route 10.5.0.0 255.255.0.0 10.0.1.254
!
ip dhcp pool LAN
 network 10.0.1.0 255.255.255.0
 default-router 10.0.1.1
 dns-server 10.0.1.2 1.1.1.1
!
ip nat pool NATPOOL 203.0.113.10 203.0.113.20 netmask 255.255.255.240
!
route-map RM-1 permit 10
!
vlan 40
 name GUEST
!
end
