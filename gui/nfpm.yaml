name: salient-gui
arch: amd64
platform: linux
version: ${VERSION}
maintainer: "BushidoCyb3r <BushidoCyb3r@users.noreply.github.com>"
description: |
  Salient desktop map viewer — a GUI for exploring Salient network scans,
  reports, and topology maps.
homepage: "https://github.com/BushidoCyb3r/salient"
license: Apache-2.0

contents:
  - src: build/bin/gui
    dst: /usr/bin/salient-gui
    file_info:
      mode: 0755
  - src: packaging/salient-gui.desktop
    dst: /usr/share/applications/salient-gui.desktop
    file_info:
      mode: 0644
  - src: build/appicon.png
    dst: /usr/share/icons/hicolor/256x256/apps/salient-gui.png
    file_info:
      mode: 0644

overrides:
  deb:
    depends:
      - libwebkit2gtk-4.1-0
      - libgtk-3-0
  rpm:
    depends:
      - webkit2gtk4.1
      - gtk3
