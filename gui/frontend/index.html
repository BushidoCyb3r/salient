<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Defilade Operator Console</title>
<style>
 :root{
   --bg:#0d1117; --panel:#161b22; --panel2:#1c232d; --line:#30363d;
   --fg:#c9d1d9; --mut:#8b949e; --accent:#2dd4bf; --accent2:#39d3ff;
   --warn:#e3a008; --err:#f85149; --ok:#3fb950;
 }
 *{box-sizing:border-box}
 html,body{margin:0;height:100%}
 body{font:13px/1.45 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:var(--bg);color:var(--fg)}
 button{font:inherit;cursor:pointer;background:var(--panel2);color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:6px 12px}
 button:hover{border-color:var(--accent)}
 button.primary{background:var(--accent);color:#04211d;border-color:var(--accent);font-weight:700}
 button.primary:hover{background:var(--accent2);border-color:var(--accent2)}
 button:disabled{opacity:.4;cursor:not-allowed;border-color:var(--line)}
 input,select{font:inherit;background:#0b0f14;color:var(--fg);border:1px solid var(--line);border-radius:6px;padding:7px 9px;width:100%}
 input:focus,select:focus{outline:none;border-color:var(--accent)}
 label{display:block;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.04em;margin:0 0 4px}

 /* ---- launch / connect screen ---- */
 #launch{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:24px;overflow:auto;background:radial-gradient(1200px 600px at 50% -10%,#12313033,transparent),var(--bg)}
 #launch img{width:min(340px,60vw);max-height:34vh;object-fit:contain;filter:drop-shadow(0 0 24px #2dd4bf22)}
 #launch h1{margin:0;font-size:15px;letter-spacing:.28em;color:var(--mut);text-transform:uppercase;font-weight:600}
 form#connform{width:min(560px,92vw);background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px}
 form#connform .row{display:flex;flex-direction:column}
 form#connform .full{grid-column:1 / -1}
 form#connform .check{flex-direction:row;align-items:center;gap:8px}
 form#connform .check input{width:auto}
 #connbtn{grid-column:1 / -1;justify-self:stretch;padding:10px}
 #connerr{grid-column:1 / -1;color:var(--err);min-height:16px;white-space:pre-wrap}
 .hint{color:var(--mut);font-size:11px}

 /* ---- console ---- */
 #console{display:none;flex-direction:column;height:100vh}
 body.connected #launch{display:none}
 body.connected #console{display:flex}
 header#bar{display:flex;align-items:center;gap:14px;padding:9px 16px;border-bottom:1px solid var(--line);background:var(--panel)}
 header#bar .brand{font-weight:700;letter-spacing:.14em;color:var(--accent)}
 header#bar .cluster{color:var(--mut)}
 header#bar .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ok);margin-right:6px;box-shadow:0 0 8px var(--ok)}
 header#bar .spacer{flex:1}
 #wrap{flex:1;display:flex;min-height:0}
 #cy{flex:1;min-width:0;background:var(--bg)}
 aside{width:300px;border-left:1px solid var(--line);padding:12px;overflow:auto;background:var(--panel)}
 aside h2{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin:14px 0 6px}
 aside h2:first-child{margin-top:0}
 ul#snaplist{list-style:none;margin:0;padding:0}
 ul#snaplist li{padding:6px 8px;border-radius:6px;cursor:pointer;border:1px solid transparent}
 ul#snaplist li:hover{background:var(--panel2)}
 ul#snaplist li.sel{background:#10312c;border-color:var(--accent)}
 #snaplist-empty{color:var(--mut);font-style:italic}
 #search{margin-top:2px}
 .ctl label{display:flex;align-items:center;gap:7px;text-transform:none;letter-spacing:0;font-size:12px;color:var(--fg);margin:3px 0;cursor:pointer}
 .ctl input{width:auto}
 .lg{display:flex;align-items:center;gap:7px;margin:2px 0}
 .lg i{width:22px;height:4px;display:inline-block;border-radius:2px}
 #ev{white-space:pre-wrap;color:var(--mut)}

 /* scan panel (task-output console) */
 #tasks{height:170px;border-top:1px solid var(--line);background:#0b0f14;display:flex;flex-direction:column}
 #tasks .thead{display:flex;align-items:center;gap:10px;padding:5px 12px;border-bottom:1px solid var(--line);color:var(--mut)}
 #tasks .thead .run{margin-left:auto;display:flex;gap:8px}
 #tasklog{flex:1;overflow:auto;padding:8px 12px;white-space:pre-wrap;font-size:12px}
 #tasklog .ln{color:var(--fg)}
 #tasklog .ln.warn{color:var(--warn)}
 #tasklog .ln.err{color:var(--err)}
 #tasklog .ln.ok{color:var(--ok)}
 #tasklog .ts{color:var(--mut)}
 .pulse{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 0 #2dd4bf88;animation:pl 1.1s infinite}
 .pulse.idle{background:var(--line);box-shadow:none;animation:none}
 @keyframes pl{0%{box-shadow:0 0 0 0 #2dd4bf88}70%{box-shadow:0 0 0 8px #2dd4bf00}100%{box-shadow:0 0 0 0 #2dd4bf00}}

 #ctxmenu{position:absolute;display:none;background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:0 8px 24px #000a;z-index:10}
 #ctxmenu div{padding:7px 16px;cursor:pointer}
 #ctxmenu div:hover{background:var(--panel2);color:var(--accent)}

 /* scan-config popover */
 #scancfg{position:absolute;display:none;top:44px;right:16px;z-index:12;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:14px;width:300px;box-shadow:0 8px 24px #000a}
 #scancfg .row{margin-bottom:9px}
 #scanwarn{color:var(--warn);font-size:11px;min-height:14px}
</style></head><body>

<!-- launch / connect -->
<div id="launch">
  <img src="/defilade-logo.png" alt="Defilade">
  <h1>Operator Console</h1>
  <form id="connform" autocomplete="off">
    <div class="row full"><label>Elasticsearch URL</label><input id="c-url" placeholder="https://so-manager:9200" spellcheck="false"></div>
    <div class="row full"><label>API key</label><input id="c-key" type="password" placeholder="base64 id:key" spellcheck="false"></div>
    <div class="row"><label>CA cert path</label><input id="c-ca" placeholder="grid-ca.pem (optional)" spellcheck="false"></div>
    <div class="row"><label>Field map path</label><input id="c-fm" placeholder="custom.yaml (optional)" spellcheck="false"></div>
    <div class="row"><label>Window</label><input id="c-window" value="336h"></div>
    <div class="row"><label>Timezone</label><input id="c-tz" value="Local"></div>
    <div class="row full"><label>Scope CIDRs (comma-separated)</label><input id="c-scope" placeholder="10.0.0.0/8 (blank = all observed)" spellcheck="false"></div>
    <div class="row check full"><input type="checkbox" id="c-insecure"><label style="margin:0">Disable TLS verification (insecure)</label></div>
    <button type="submit" class="primary" id="connbtn">Connect</button>
    <div id="connerr"></div>
    <div class="hint full">Read-only client. The API key stays in memory only — never written to disk.</div>
  </form>
</div>

<!-- console -->
<div id="console">
  <header id="bar">
    <span class="brand">DEFILADE</span>
    <span class="cluster" id="clustername"><span class="dot"></span>—</span>
    <span class="spacer"></span>
    <button id="scanbtn" class="primary">Run Scan ▾</button>
    <button id="cancelbtn" disabled>Cancel</button>
  </header>

  <div id="scancfg">
    <div class="row"><label>Window</label><input id="s-window" value="336h"></div>
    <div class="row"><label>Scope CIDRs</label><input id="s-scope" placeholder="10.0.0.0/8"></div>
    <div class="row"><label>Timezone</label><input id="s-tz" value="Local"></div>
    <div id="scanwarn"></div>
    <button class="primary" id="scango" style="width:100%">Start scan</button>
  </div>

  <div id="wrap">
    <div id="cy"></div>
    <aside>
      <h2>Snapshots</h2>
      <ul id="snaplist"></ul>
      <div id="snaplist-empty" style="display:none">No snapshots yet. Run a scan.</div>
      <h2>Layout</h2>
      <button id="b-fcose" class="on">organic</button><button id="b-dagre">tiered</button>
      <h2>Layers</h2>
      <div class="ctl">
        <label><input type="checkbox" id="l-heat"> criticality heat</label>
        <label><input type="checkbox" id="l-lbl" checked> edge labels</label>
        <label><input type="checkbox" id="l-drift" checked> drift highlights</label>
      </div>
      <h2>Search</h2>
      <input id="search" placeholder="IP, hostname, role...">
      <h2>Legend</h2>
      <div id="legend"></div>
      <h2>Evidence</h2><div id="ev">click a node</div>
    </aside>
  </div>

  <div id="tasks">
    <div class="thead"><span class="pulse idle" id="pulse"></span><span id="taskstate">idle</span>
      <span class="run"></span></div>
    <div id="tasklog"></div>
  </div>
</div>

<div id="ctxmenu"></div>
<script src="/vendor/cytoscape.min.js"></script>
<script src="/vendor/layout-base.js"></script>
<script src="/vendor/cose-base.js"></script>
<script src="/vendor/cytoscape-fcose.js"></script>
<script src="/vendor/dagre.min.js"></script>
<script src="/vendor/cytoscape-dagre.js"></script>
<script type="module" src="./src/main.js"></script>
</body></html>
